<html>
  <head>
    <style type="text/css" media="screen">
      #editorContainer {
        position: relative;
        float: left;
        width: 40%;
        height: 100vh;
      }
      #editor {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        float: left;
      }
      #dbContainer {
        width: 60%;
        float: right;
        height: 100vh;
      }
      #toolbarContainer {
        position: absolute;
        left: 0;
        bottom: 10;
        background-color: lightblue;
        opacity: 0.8;
        z-index: 10;
      }

      #autoBtnContainer input[type="checkbox"] {
        display: none;
      }

      #autoBtnContainer span {
        border-radius: 3px;
        color: blue;
      }

      #autoBtnContainer input[type="checkbox"]:checked + span {
        background-color: blue;
        color: lightblue;
      }

      #editorControls {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div id="editorContainer">
      <div id="editor"></div>
    </div>

    <div id="dbContainer">
      <iframe
        id="dbFrame"
        width="100%"
        height="100%"
        src="dashbuilder-runtime-client/"
        frameborder="0"
      ></iframe>
    </div>

    <script src="ace/ace.js" type="text/javascript" charset="utf-8"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"
      integrity="sha512-CSBhVREyzHAjAFfBlIBakjoRUKp5h7VSweP0InR/pAJyptH7peuhCsqAI/snV+TwZmXZqoUklpXp6R6wMnYf5Q=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <div id="toolbarContainer">
      <button id="hideEditorBtn"><strong>PREVIEW</strong></button>
      <div id="editorControls">
        <label id="autoBtnContainer"
          ><input type="checkbox" id="autoBtn" /><span>AUTO</span></label
        >
        <button id="updateBtn"><strong>UPDATE</strong></button>
      </div>
    </div>
    <script src="js/index.js"></script>
  </body>
</html>
